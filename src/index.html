<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ComplianceAI Expert</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="styles.css" />
</head>
<body>

	<!-- TOP NAV -->
	<header class="topbar">

			<div class="app-logo">CE</div>
			<span class="app-name">ComplianceAI Expert</span>
		</div>
		<div class="topbar-center">
			<div class="search-wrap">
				<svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" /></svg>
				<input type="text" id="search-input" placeholder="Search by Name or Tally ID" />
			</div>
		</div>
		<div class="topbar-right">
			<!--<button class="btn-primary" id="add-company-btn">
				<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10" /><path d="M12 8v8M8 12h8" /></svg>
				Add Companies
			</button>-->
			<!--<button class="btn-settings">
				<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>
				Settings
			</button>-->
			<button class="btn-logout" title="Logout">
				<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#e8621a" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></svg>
			</button>
		</div>
	</header>

	<!-- PAGE TITLE -->
	<div class="page-title-row">
		<h2 class="page-title">My Companies</h2>
		<button class="btn-refresh" id="refresh-btn">
			<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10" /><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" /></svg>
		</button>
	</div>

	<!-- COLUMNS -->
	<main class="main">
		<div class="columns">
			<div class="column col-connected">
				<div class="col-header">
					<span class="dot dot-green"></span>
					<span class="col-title">Connected</span>
				</div>
				<div class="cards-area" id="connected-list"></div>
			</div>
			<div class="column col-disconnected">
				<div class="col-header">
					<span class="dot dot-red"></span>
					<span class="col-title">Disconnected</span>
				</div>
				<div class="cards-area" id="disconnected-list"></div>
			</div>
		</div>
	</main>

	<!-- BOTTOM PROMPT -->
	<!--<div class="bottom-prompt">
		<span>Do you see the company you want to work on above list?</span>
		<button class="btn-yes">Yes</button>
		<button class="btn-no">No</button>
	</div>-->

	<!-- STATUS BAR -->
	<footer class="statusbar">
		<div class="status-item" id="tally-status-item">
			<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="2" id="tally-icon"><rect x="2" y="3" width="20" height="14" rx="2" /><path d="M8 21h8M12 17v4" /></svg>
			<span>Tally : <strong id="tally-text">CONNECTED</strong></span>
		</div>
		<div class="status-version">v 1.0.0</div>
		<div class="status-item">
			<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0" /><path d="M1.42 9a16 16 0 0 1 21.16 0" /><path d="M8.53 16.11a6 6 0 0 1 6.95 0" /><line x1="12" y1="20" x2="12.01" y2="20" /></svg>
			<span>Internet : <strong>CONNECTED</strong></span>
		</div>
	</footer>

	<!-- ═══════════════════════════════════════════════════
		 ADD COMPANIES DRAWER — slides up from bottom half
		 ═══════════════════════════════════════════════════ -->
	<div class="drawer-backdrop" id="drawer-backdrop"></div>

	<div class="drawer" id="add-companies-drawer">
		<div class="drawer-handle"></div>

		<div class="drawer-header">
			<div class="drawer-title-group">
				<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#1a56db" stroke-width="2">
					<rect x="2" y="7" width="20" height="14" rx="1.5" />
					<path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
					<line x1="12" y1="12" x2="12" y2="16" />
					<line x1="10" y1="14" x2="14" y2="14" />
				</svg>
				<div>
					<h3 class="drawer-title">Add Companies from Tally</h3>
					<p class="drawer-subtitle">Selecting a company syncs all master data &amp; vouchers into your database</p>
				</div>
			</div>
			<button class="drawer-close" id="drawer-close">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
					<line x1="18" y1="6" x2="6" y2="18" />
					<line x1="6" y1="6" x2="18" y2="18" />
				</svg>
			</button>
		</div>

		<div class="drawer-search-wrap">
			<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" /></svg>
			<input type="text" id="drawer-search" placeholder="Search Tally companies…" />
		</div>

		<div class="drawer-list" id="drawer-list"></div>
	</div>

	<div id="toast" class="toast"></div>
	<script>
		// ── Auth guard — redirect to login if no session ──────
		(function() {
		if (!sessionStorage.getItem("sb_access_token")) {
		window.location.href = "login.html";
		}
		})();
	</script>
	<script src="main.js"></script>
</body>
</html>
